<script>
// ── STARS
(function(){const c=document.getElementById('stars');for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+0.5;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--o:${(Math.random()*0.6+0.1).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(1)}s`;c.appendChild(s);}})();

// ── SHARED IN-MEMORY PRESCRIPTION STATE
// This acts as a simulated backend — doctor writes, patient reads live
const SHARED = {
  prescriptions: [],
  listeners: [],
  notify() { this.listeners.forEach(fn => fn()); }
};

// ── PAGE ROUTER
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>{p.classList.remove('visible');p.classList.add('hidden');});
  const el=document.getElementById('page-'+id);
  if(!el)return;
  el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('visible'),10);
  try{el.scrollTo(0,0);}catch(e){}
}

// ── NAV DROPDOWN
function toggleNavDropdown(){
  const dd=document.getElementById('nav-dropdown');
  const btn=document.getElementById('nav-dd-btn');
  const open=dd.classList.contains('open');
  dd.classList.toggle('open',!open);
  btn.classList.toggle('open',!open);
}
document.addEventListener('click',e=>{
  const trigger=document.querySelector('.nav-dropdown-trigger');
  if(trigger&&!trigger.contains(e.target)){
    document.getElementById('nav-dropdown').classList.remove('open');
    document.getElementById('nav-dd-btn').classList.remove('open');
  }
});

// ── COUNTERS
const cObs=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting)startCount(e.target)});},{threshold:0.5});
document.querySelectorAll('.count-up').forEach(el=>cObs.observe(el));
function startCount(el){if(el.dataset.done)return;el.dataset.done='1';const t=+el.dataset.target,dur=1600,s=performance.now();function tick(n){const p=Math.min((n-s)/dur,1),ev=1-Math.pow(1-p,3);el.textContent=Math.floor(ev*t);if(p<1)requestAnimationFrame(tick);else el.textContent=t;}requestAnimationFrame(tick);}

// ── REVEAL
const revObs=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.1});
document.querySelectorAll('.reveal,.feat-card').forEach((el,i)=>{if(el.classList.contains('feat-card'))el.style.transitionDelay=`${(i%6)*0.08}s`;revObs.observe(el);});

// ── AUTH STATE
let authRole='patient', currentUser=null;
function openAuth(mode,role){
  setAuthMode(mode);
  if(role)setAuthRole(role);
  document.getElementById('nav-dropdown').classList.remove('open');
  document.getElementById('nav-dd-btn').classList.remove('open');
  showPage('auth');
}
function setAuthMode(mode){
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('login-form').style.display=mode==='login'?'block':'none';
  document.getElementById('signup-form').style.display=mode==='signup'?'block':'none';
  document.getElementById('auth-sub-text').textContent=mode==='login'?'Welcome back':'Create your account';
  ['login-error','signup-error','signup-success'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('show');});
}
function setAuthRole(role){
  authRole=role;
  document.getElementById('rbtn-patient').classList.toggle('active',role==='patient');
  document.getElementById('rbtn-patient').classList.toggle('patient-active',role==='patient');
  document.getElementById('rbtn-doctor').classList.toggle('active',role==='doctor');
  document.getElementById('rbtn-doctor').classList.toggle('doctor-active',role==='doctor');
  const sr=document.getElementById('su-reg-wrap'), ss=document.getElementById('su-spec-wrap');
  if(sr)sr.style.display=role==='doctor'?'block':'none';
  if(ss)ss.style.display=role==='doctor'?'block':'none';
  const lb=document.getElementById('login-submit-btn'), sb=document.getElementById('signup-submit-btn');
  if(role==='doctor'){lb.classList.add('doctor-btn');if(sb)sb.classList.add('doctor-btn');}
  else{lb.classList.remove('doctor-btn');if(sb)sb.classList.remove('doctor-btn');}
}
let loginMethod='email';
function setLoginMethod(btn,method){
  document.querySelectorAll('.method-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); loginMethod=method;
  document.getElementById('lm-email').style.display=method==='email'?'block':'none';
  document.getElementById('lm-mobile').style.display=method==='mobile'?'block':'none';
  document.getElementById('lm-abha').style.display=method==='abha'?'block':'none';
}
function sendOTP(){
  const mob=document.getElementById('login-mobile').value;
  if(!mob){alert('Enter a mobile number first.');return;}
  document.getElementById('otp-field-wrap').style.display='block';
  document.getElementById('send-otp-btn').textContent='Resend OTP';
  document.querySelectorAll('#lm-mobile .otp-fields input').forEach((inp,i)=>inp.value=['1','2','3','4','5','6'][i]);
}
function otpNext(el){if(el.value&&el.nextElementSibling)el.nextElementSibling.focus();}

const USERS={
  'patient@demo.com':{pass:'patient123',role:'patient',name:'Ananya Rao',fname:'Ananya',patientKey:'ananya'},
  'doctor@demo.com': {pass:'doctor123', role:'doctor', name:'Dr. Priya Mehta',fname:'Priya',patientKey:null},
};

async function doLogin(){
  const id=(document.getElementById('login-email').value||'').trim().toLowerCase();
  const pass=(document.getElementById('login-pass').value||'').trim();
  const err=document.getElementById('login-error');
  err.classList.remove('show');
  
  try {
    const response = await fetch('/api/login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: id, password: pass, role: authRole })
    });
    
    const result = await response.json();
    if (result.success) {
      // Upon successful login, reload via proper Django URL routing 
      // instead of injecting JavaScript variables directly here
      window.location.href = `/${authRole}/`;
    } else {
      err.textContent = result.message || 'Invalid credentials.';
      err.classList.add('show');
    }
  } catch (error) {
    err.textContent = 'Server error during login.';
    err.classList.add('show');
  }
}
function doSignup(){
  const fn=(document.getElementById('su-fname').value||'').trim();
  const ln=(document.getElementById('su-lname').value||'').trim();
  const em=(document.getElementById('su-email').value||'').trim();
  const p1=(document.getElementById('su-pass').value||'').trim();
  const p2=(document.getElementById('su-pass2').value||'').trim();
  const err=document.getElementById('signup-error'), suc=document.getElementById('signup-success');
  err.classList.remove('show');suc.classList.remove('show');
  if(!fn||!ln||!em){err.textContent='Please fill in your name and email.';err.classList.add('show');return;}
  if(p1.length<8){err.textContent='Password must be at least 8 characters.';err.classList.add('show');return;}
  if(p1!==p2){err.textContent='Passwords do not match.';err.classList.add('show');return;}
  const suReg=document.getElementById('su-reg');
  if(authRole==='doctor'&&suReg&&!(suReg.value||'').trim()){err.textContent='Medical registration number required.';err.classList.add('show');return;}
  suc.classList.add('show');
  const pkey = fn.toLowerCase()+ln.toLowerCase().charAt(0);
  setTimeout(()=>launchDashboard({role:authRole,name:(authRole==='doctor'?'Dr. ':'')+fn+' '+ln,fname:fn,patientKey:pkey}),1200);
}

function launchDashboard(user){
  currentUser=user;
  if(user.role==='doctor'){
    document.getElementById('doctor-name-nav').textContent=user.name;
    showPage('doctor');
    renderAllDocPanels();
  } else {
    document.getElementById('patient-name-nav').textContent=user.fname+' R.';
    document.getElementById('patient-greet-name').textContent=user.fname;
    showPage('patient');
    buildPatientTimeline();
    renderPatientPrescriptions();
    // Register live listener
    SHARED.listeners = SHARED.listeners.filter(fn=>fn._uid!=='patient_rx');
    const listener = ()=>{buildPatientTimeline();renderPatientPrescriptions();};
    listener._uid='patient_rx';
    SHARED.listeners.push(listener);
  }
}
async function doLogout(){
  try {
    await fetch('/api/logout/', { method: 'POST' });
  } catch(e) {}
  
  window.location.href = '/';
}

// ── PATIENT NAV
function showPatientPanel(id,el){
  document.querySelectorAll('.dash-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');

// ── DOCTOR NAV
function showDocPanel(id,btn){
  document.querySelectorAll('.doc-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.doc-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('d-'+id).classList.add('active');

}

// ── DOCTOR: PRESCRIBE
const PATIENT_INFO = {
  patient_demo: 'Ananya R. · patient@demo.com · No medications prescribed yet',
};
function updateRxPatientInfo(){
  const sel=document.getElementById('rx-patient').value;
  const info=document.getElementById('rx-patient-info');
  if(sel&&PATIENT_INFO[sel]){info.style.display='block';info.innerHTML='<strong style="color:var(--teal-light)">Patient Profile: </strong>'+PATIENT_INFO[sel];}
  else info.style.display='none';
}
function prescribeDrug(){
  const pat=document.getElementById('rx-patient').value;
  const drug=(document.getElementById('rx-drug').value||'').trim();
  const dose=(document.getElementById('rx-dose').value||'').trim();
  const freq=document.getElementById('rx-freq').value;
  const time=document.getElementById('rx-time').value;
  const dur=(document.getElementById('rx-duration').value||'').trim();
  const instr=(document.getElementById('rx-instructions').value||'').trim();
  const notes=(document.getElementById('rx-notes').value||'').trim();
  const errEl=document.getElementById('rx-error');
  errEl.style.display='none';
  if(!pat||!drug||!dose){errEl.textContent='Please select a patient and enter drug name and dosage.';errEl.style.display='block';return;}

  // Show syncing badge
  const badge=document.getElementById('rx-live-badge');
  badge.style.display='inline';

  // Determine risk dot/badge from drug name (simple heuristic)
  const dname=drug.toLowerCase();
  let dot='', badgeText='Scheduled', badgeClass='risk-ok';
  if(['warfarin','digoxin','phenytoin'].some(d=>dname.includes(d))){dot='danger';badgeText='Narrow TI';badgeClass='risk-high';}
  else if(['levothyroxine','lithium'].some(d=>dname.includes(d))){dot='warn';badgeText='Monitor';badgeClass='risk-warn';}
  else if(['metformin'].some(d=>dname.includes(d))){badgeText='Optimal';badgeClass='risk-clear';}

  const rx = {
    id:'rx'+Date.now(),
    patient: pat,
    drug, dose, freq, time, duration:dur||'Ongoing',
    instructions: instr||'As directed',
    notes,
    prescribedBy: currentUser ? currentUser.name : 'Doctor',
    ts: Date.now(),
    dot, badge: badgeClass, badgeText
  };
  SHARED.prescriptions.push(rx);
  SHARED.notify(); // ← real-time push to patient

  // Clear form
  ['rx-drug','rx-dose','rx-duration','rx-instructions','rx-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('rx-patient').value='';
  document.getElementById('rx-patient-info').style.display='none';
  renderAllDocPanels();

  // Show sync confirmation then hide badge
  setTimeout(()=>{badge.style.display='none';},2000);

  // Update patient timeline if patient is currently viewing
  if(document.getElementById('page-patient').classList.contains('visible')){
    buildPatientTimeline();
    renderPatientPrescriptions();
  }
}

// Patient display name from key
const PAT_DISPLAY = { patient_demo: 'Ananya R.' };

function renderAllDocPanels(){
  renderDocPrescriptions();
  renderQueue();
  renderMatrix();
  renderPK();
  renderPatientsList();
  // update override drug list
  const ovDrug=document.getElementById('ov-drug');
  if(ovDrug){
    const drugs=[...new Set(SHARED.prescriptions.map(r=>r.drug+' '+r.dose))];
    ovDrug.innerHTML='<option value="">— Select drug —</option>'+drugs.map(d=>`<option>${d}</option>`).join('');
  }
  // update PK patient name
  const pkName=document.getElementById('pk-patient-name');
  if(pkName) pkName.textContent = SHARED.prescriptions.length ? (PAT_DISPLAY['patient_demo']+' · patient@demo.com') : 'No patient selected';
  // update matrix subtitle
  const matLbl=document.getElementById('matrix-patient-label');
  if(matLbl) matLbl.textContent = SHARED.prescriptions.length ? 'Ananya R. · click any row for notes' : 'Prescribe medications to see interaction data here.';
}

function renderQueue(){
  const body=document.getElementById('queue-body');
  if(!body)return;
  const rxs=SHARED.prescriptions;
  if(!rxs.length){body.innerHTML='<div style="text-align:center;padding:2.5rem;color:var(--muted);font-size:0.84rem">No prescriptions yet. Use the Prescribe tab to add medications.</div>';return;}
  // Group by patient
  const byPat={};
  rxs.forEach(r=>{if(!byPat[r.patient])byPat[r.patient]=[];byPat[r.patient].push(r);});
  body.innerHTML='';
  let rank=1;
  Object.entries(byPat).forEach(([pat,meds])=>{
    const highRisk=meds.filter(m=>m.badge==='risk-high');
    const topFlag=highRisk.length?highRisk[0].drug+' ('+highRisk[0].badgeText+')':meds[0].drug;
    const scoreClass=highRisk.length?'high':meds.some(m=>m.badge==='risk-warn')?'med':'ok';
    const row=document.createElement('div');
    row.className='queue-row';
    row.innerHTML=`<span class="q-rank">${rank++}</span><div><div style="font-size:0.84rem">${PAT_DISPLAY[pat]||pat}</div><div class="p-info">${meds.length} drug${meds.length!==1?'s':''} prescribed</div></div><span class="p-info">${meds.length} drug${meds.length!==1?'s':''}</span><span class="risk-badge ${highRisk.length?'risk-high':meds.some(m=>m.badge==='risk-warn')?'risk-warn':'risk-clear'}">${topFlag}</span><button class="btn-primary" style="padding:0.3rem 0.8rem;font-size:0.72rem" onclick="showDocPanel('matrix',document.querySelectorAll('.doc-tab')[2])">Review</button>`;
    body.appendChild(row);
  });
}

function renderMatrix(){
  const tbody=document.getElementById('matrix-body');
  if(!tbody)return;
  const rxs=SHARED.prescriptions;
  if(!rxs.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2.5rem;color:var(--muted);font-size:0.84rem">No prescriptions yet. Matrix will populate once the doctor prescribes medications.</td></tr>';return;}
  // Known interaction DB
  const INTERACTIONS={
    warfarin:   [{with:'Vitamin K',mech:'Clotting factor antagonism',sev:'high',sep:'Consistent intake',ref:'FDA Label — Coumadin'}],
    levothyroxine:[{with:'Calcium',mech:'GI chelation complex',sev:'high',sep:'4 hrs before/after',ref:'DrugBank DB01089'},{with:'Iron',mech:'Chelation / complex',sev:'high',sep:'2+ hrs',ref:'PMID 2060551'}],
    amlodipine: [{with:'Grapefruit',mech:'CYP3A4 inhibition',sev:'high',sep:'Avoid entirely',ref:'FDA Label — Norvasc'}],
    metformin:  [{with:'High-fat meal',mech:'GI tolerability',sev:'moderate',sep:'Take with food',ref:'PMID 1888786'}],
    digoxin:    [{with:'Calcium',mech:'Cardiac contractility',sev:'moderate',sep:'Monitor levels',ref:'FDA Label — Lanoxin'}],
  };
  tbody.innerHTML='';
  let hasRows=false;
  rxs.forEach(rx=>{
    const key=rx.drug.toLowerCase();
    const ints=INTERACTIONS[key]||[];
    ints.forEach(i=>{
      hasRows=true;
      const sevClass=i.sev==='high'?'sev-high':'sev-med';
      const dotClass=i.sev==='high'?'high':'med';
      const tr=document.createElement('tr');
      tr.onclick=()=>alert(`${rx.drug} × ${i.with}\n\nMechanism: ${i.mech}\nSeparation: ${i.sep}\nSource: ${i.ref}`);
      tr.innerHTML=`<td>${rx.drug}</td><td>${i.with}</td><td>${i.mech}</td><td><span class="sev-dot ${dotClass}"></span><span class="${sevClass}">${i.sev.charAt(0).toUpperCase()+i.sev.slice(1)}</span></td><td>${i.sep}</td><td style="color:var(--teal-light);font-family:'DM Mono',monospace;font-size:0.66rem">${i.ref} &#x2197;</td>`;
      tbody.appendChild(tr);
    });
  });
  if(!hasRows) tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted);font-size:0.84rem">No known interactions for current prescriptions.</td></tr>';
}

function renderPK(){
  const grid=document.getElementById('pk-grid');
  if(!grid)return;
  const rxs=SHARED.prescriptions;
  if(!rxs.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2.5rem;color:var(--muted);font-size:0.84rem">No prescriptions yet. PK summaries will appear once medications are prescribed.</div>';return;}
  const PK_DATA={
    warfarin:   [{p:'Cmax Variation',v:'+12% w/ high Vit K',c:'warn'},{p:'AUC Change',v:'Variable w/ diet',c:'warn'},{p:'INR Target',v:'2.0–3.0',c:'ok'},{p:'Monitoring',v:'Weekly INR',c:'warn'}],
    levothyroxine:[{p:'Absorption w/ Ca++',v:'–40% if simultaneous',c:'bad'},{p:'Tmax (4hr gap)',v:'Normal',c:'ok'},{p:'AUC w/ Iron',v:'–30% concurrent',c:'bad'},{p:'TSH Target',v:'0.5–4.5 mIU/L',c:'ok'}],
    amlodipine: [{p:'Cmax w/ Grapefruit',v:'+35%',c:'bad'},{p:'AUC w/ Grapefruit',v:'+40%',c:'bad'},{p:'Half-life',v:'30–50 hrs',c:'ok'},{p:'BP Target',v:'<130/80 mmHg',c:'ok'}],
    metformin:  [{p:'Cmax w/ food',v:'–17% (intended)',c:'ok'},{p:'Tmax w/ food',v:'+35 min',c:'ok'},{p:'AUC Change',v:'<5%',c:'ok'},{p:'HbA1c Target',v:'<7%',c:'ok'}],
    digoxin:    [{p:'Therapeutic Window',v:'0.5–2.0 ng/mL',c:'warn'},{p:'Ca++ Interaction',v:'Potentiates toxicity',c:'bad'},{p:'P-gp Substrate',v:'Monitor level',c:'warn'},{p:'Renal Clearance',v:'CrCl dependent',c:'warn'}],
  };
  grid.innerHTML='';
  let found=false;
  rxs.forEach(rx=>{
    const data=PK_DATA[rx.drug.toLowerCase()];
    if(!data)return;
    found=true;
    const card=document.createElement('div');card.className='pk-card';
    card.innerHTML=`<div class="pk-drug">${rx.drug} ${rx.dose}</div>`+data.map(r=>`<div class="pk-row"><span class="pk-param">${r.p}</span><span class="pk-val ${r.c}">${r.v}</span></div>`).join('');
    grid.appendChild(card);
  });
  if(!found) grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-size:0.84rem">No PK data available for current prescriptions.</div>';
}

function renderPatientsList(){
  const list=document.getElementById('patients-list');
  if(!list)return;
  const rxs=SHARED.prescriptions;
  if(!rxs.length){list.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.84rem">No patients registered yet.</div>';return;}
  const byPat={};
  rxs.forEach(r=>{if(!byPat[r.patient])byPat[r.patient]=[];byPat[r.patient].push(r);});
  list.innerHTML='';
  Object.entries(byPat).forEach(([pat,meds])=>{
    const hasHigh=meds.some(m=>m.badge==='risk-high');
    const hasMed=meds.some(m=>m.badge==='risk-warn');
    const scoreClass=hasHigh?'high':hasMed?'med':'ok';
    const riskLabel=hasHigh?'High Risk':hasMed?'Moderate':'Low Risk';
    const riskBadge=hasHigh?'risk-high':hasMed?'risk-warn':'risk-clear';
    const row=document.createElement('div');row.className='patient-row';
    row.innerHTML=`<div><div class="p-name">${PAT_DISPLAY[pat]||pat}</div><div class="p-info">${meds.length} drug${meds.length!==1?'s':''} · prescribed by ${meds[0].prescribedBy}</div></div><span class="p-score ${scoreClass}">${meds.length}</span><span class="risk-badge ${riskBadge}">${riskLabel}</span><button class="btn-primary" style="padding:0.38rem 0.9rem;font-size:0.74rem" onclick="showDocPanel('prescribe',document.querySelectorAll('.doc-tab')[1])">Prescribe</button>`;
    list.appendChild(row);
  });
}

function renderDocPrescriptions(){
  const list=document.getElementById('doc-rx-list');
  const badge=document.getElementById('rx-count-badge');
  if(!list)return;
  const all=SHARED.prescriptions;
  badge.textContent=all.length+' active';
  if(all.length===0){list.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.84rem">No prescriptions issued yet.</div>';return;}
  list.innerHTML='';
  const hdr=document.createElement('div');
  hdr.style.cssText='display:grid;grid-template-columns:100px 1fr 80px 1fr auto;gap:0.8rem;padding:0.6rem 1rem;font-family:DM Mono,monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--card-border);background:rgba(255,255,255,0.02)';
  hdr.innerHTML='<span>Patient</span><span>Drug / Dose</span><span>Time</span><span>Instructions</span><span>Action</span>';
  list.appendChild(hdr);
  all.forEach(rx=>{
    const row=document.createElement('div');
    row.style.cssText='display:grid;grid-template-columns:100px 1fr 80px 1fr auto;gap:0.8rem;padding:0.75rem 1rem;border-bottom:1px solid var(--card-border);font-size:0.8rem;align-items:center;transition:background 0.2s';
    row.onmouseenter=()=>row.style.background='rgba(255,255,255,0.02)';
    row.onmouseleave=()=>row.style.background='transparent';
    row.innerHTML=`
      <span style="font-size:0.78rem;color:var(--muted)">${PAT_DISPLAY[rx.patient]||rx.patient}</span>
      <div><strong style="color:var(--white)">${rx.drug} ${rx.dose}</strong><div style="font-size:0.72rem;color:var(--muted)">${rx.freq}</div></div>
      <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--teal-light)">${rx.time}</span>
      <span style="font-size:0.76rem;color:var(--muted)">${rx.instructions}</span>
      <button onclick="revokePrescription('${rx.id}')" style="padding:0.25rem 0.6rem;border-radius:0.4rem;border:1px solid rgba(240,128,128,0.35);background:transparent;color:#f08080;font-size:0.7rem;cursor:pointer;font-family:Outfit,sans-serif;white-space:nowrap">Revoke</button>`;
    list.appendChild(row);
  });
}

function revokePrescription(id){
  if(!confirm('Revoke this prescription? The patient will no longer see it.'))return;
  SHARED.prescriptions=SHARED.prescriptions.filter(r=>r.id!==id);
  SHARED.notify();
  renderAllDocPanels();
}

// ── PATIENT: RENDER PRESCRIBED MEDS (read-only, locked)
function renderPatientPrescriptions(){
  const list=document.getElementById('pt-prescribed-list');
  const noRx=document.getElementById('pt-no-rx');
  if(!list||!currentUser)return;
  const mine=SHARED.prescriptions.filter(r=>r.patient===currentUser.patientKey);

  // Update widgets
  const highCount=mine.filter(m=>m.badge==='risk-high').length;
  const modCount=mine.filter(m=>m.badge==='risk-warn').length;
  const wMeds=document.getElementById('w-meds'); if(wMeds)wMeds.textContent=mine.length;
  const wHigh=document.getElementById('w-high'); if(wHigh)wHigh.textContent=highCount;
  const wMod=document.getElementById('w-mod');  if(wMod)wMod.textContent=modCount;
  const wAdh=document.getElementById('w-adh');
  if(wAdh){wAdh.textContent=mine.length?'87%':'—';wAdh.style.color=mine.length?'#7dce82':'var(--muted)';}
  const wMedsSub=document.getElementById('w-meds-sub'); if(wMedsSub)wMedsSub.textContent=mine.length?'All scheduled':'Awaiting prescription';
  const wHighSub=document.getElementById('w-high-sub'); if(wHighSub)wHighSub.textContent=highCount?mine.filter(m=>m.badge==='risk-high')[0].drug:'No flags';
  const wModSub=document.getElementById('w-mod-sub');  if(wModSub)wModSub.textContent=modCount?'Timing adjusted':'No flags';
  const sub=document.getElementById('schedule-sub');
  if(sub)sub.textContent=mine.length?`${mine.length} medication${mine.length!==1?'s':''} prescribed — schedule optimized`:'Awaiting prescriptions from your doctor.';

  // Risk counts
  const rcHigh=document.getElementById('rc-high'); if(rcHigh)rcHigh.textContent=highCount;
  const rcMed=document.getElementById('rc-med');   if(rcMed)rcMed.textContent=modCount;
  const rcLow=document.getElementById('rc-low');   if(rcLow)rcLow.textContent=mine.filter(m=>m.badge==='risk-clear'||m.badge==='risk-ok').length;

  // Risk detail rows
  const riskDetail=document.getElementById('pt-risk-detail');
  if(riskDetail){
    if(!mine.length){riskDetail.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.84rem">No medications prescribed yet. Interaction details will appear here.</div>';}
    else{
      const RISK_NOTES={
        warfarin:'Antagonism — INR destabilization risk. Maintain consistent dietary Vitamin K intake.',
        levothyroxine:'Chelation — 4-hour separation enforced before calcium-rich meals or supplements.',
        amlodipine:'CYP3A4 inhibition — grapefruit excluded from dietary profile.',
        metformin:'GI tolerability — take with food, AUC impact minimal.',
        digoxin:'Cardiac contractility — monitor calcium levels, narrow therapeutic window.',
      };
      const sevOrder={'risk-high':0,'risk-warn':1,'risk-ok':2,'risk-clear':3};
      const sorted=[...mine].sort((a,b)=>(sevOrder[a.badge]||9)-(sevOrder[b.badge]||9));
      riskDetail.innerHTML=sorted.map(rx=>{
        const note=RISK_NOTES[rx.drug.toLowerCase()]||'No known major interactions. Follow prescribed instructions.';
        const sevLabel=rx.badge==='risk-high'?'HIGH':rx.badge==='risk-warn'?'MOD':'LOW';
        const sevColor=rx.badge==='risk-high'?'#f08080':rx.badge==='risk-warn'?'var(--gold-light)':'#7dce82';
        const dotColor=rx.badge==='risk-high'?'#f08080':rx.badge==='risk-warn'?'var(--gold-light)':'var(--teal)';
        return `<div class="tl-day-row" style="cursor:default"><div class="tl-hr" style="color:${sevColor}">${sevLabel}</div><div class="tl-dot-col"><div class="tl-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}"></div></div><div class="tl-info"><span class="tl-name">${rx.drug} ${rx.dose}</span><span class="risk-badge ${rx.badge}">${rx.badgeText}</span><span class="tl-note">${note}</span></div></div>`;
      }).join('');
    }
  }

  // Prescribed list (read-only)
  if(!mine.length){list.innerHTML='';noRx.style.display='block';return;}
  noRx.style.display='none';
  list.innerHTML='';
  mine.forEach(rx=>{
    const card=document.createElement('div');
    card.style.cssText='display:grid;grid-template-columns:60px 1fr auto;align-items:start;gap:0;padding:0.9rem 0;border-bottom:1px solid var(--card-border)';
    const dotColor={'':`var(--teal)`,meal:`var(--gold)`,warn:`var(--gold-light)`,danger:`#f08080`}[rx.dot]||'var(--teal)';
    card.innerHTML=`
      <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);padding-top:2px">${rx.time}</div>
      <div style="padding:0 0.8rem">
        <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.3rem;flex-wrap:wrap">
          <div style="width:9px;height:9px;border-radius:50%;background:${dotColor};box-shadow:0 0 6px ${dotColor};flex-shrink:0"></div>
          <span style="font-size:0.85rem;font-weight:400">${rx.drug} ${rx.dose}</span>
          <span class="risk-badge ${rx.badge}" style="font-size:0.58rem">${rx.badgeText}</span>
          <span style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted);display:inline-flex;align-items:center;gap:0.3rem"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Doctor-Prescribed</span>
        </div>
        <div style="font-size:0.76rem;color:var(--muted);line-height:1.55">${rx.instructions} &nbsp;&middot;&nbsp; ${rx.freq} &nbsp;&middot;&nbsp; ${rx.duration}</div>
        <div style="font-size:0.72rem;color:var(--teal-light);margin-top:0.2rem">Prescribed by ${rx.prescribedBy}</div>
      </div>
      <span style="font-family:'DM Mono',monospace;font-size:0.6rem;color:rgba(240,128,128,0.6);border:1px solid rgba(240,128,128,0.2);padding:0.12rem 0.5rem;border-radius:0.8rem;margin-top:2px;white-space:nowrap">Read Only</span>`;
    list.appendChild(card);
  });
}

// ── PATIENT TIMELINE (from shared prescriptions)
const MEAL_ROWS=[
  {time:'07:00',name:'🍳 Breakfast',note:'Calcium-rich meal — supplement flag active',dot:'meal',badge:'risk-warn',badgeText:'Monitored',why:'Breakfast contains calcium-rich foods (dairy). Calcium forms insoluble chelates with levothyroxine and iron supplements.'},
  {time:'19:30',name:'🍽️ Dinner',note:'Low Vitamin K — consistent with warfarin schedule',dot:'meal',badge:'risk-ok',badgeText:'Consistent',why:'Dinner is maintained low in Vitamin K to stabilize warfarin anticoagulation.'},
];
const WHY_MAP={
  levothyroxine:'Levothyroxine absorption is significantly reduced by food, especially calcium and iron. Empty stomach administration ensures maximum bioavailability. (FDA Label — Synthroid; PMID: 9922410)',
  amlodipine:'Amlodipine is a CYP3A4 substrate. Grapefruit inhibits intestinal CYP3A4, increasing bioavailability by 20–40% raising hypotension risk. (FDA Label — Norvasc; PMID: 8568566)',
  metformin:'Taking metformin with food reduces peak plasma concentration and GI side effects without meaningful AUC reduction. (PMID: 1888786)',
  warfarin:"Warfarin administered 1.5 hrs after low-Vitamin K dinner to maintain INR stability. Vitamin K directly antagonizes warfarin's anticoagulation. (FDA Label — Coumadin)",
  default:'This medication has been scheduled by your doctor to minimize interactions and maximize therapeutic benefit.',
};

function buildPatientTimeline(){
  const c=document.getElementById('pt-full-timeline');
  if(!c)return;
  c.innerHTML='';
  delete c.dataset.built;

  const rxMeds = currentUser ? SHARED.prescriptions.filter(r=>r.patient===currentUser.patientKey) : [];
  // Only show meal rows if there are medications to pair with
  const mealRows = rxMeds.length ? MEAL_ROWS : [];
  const allRows=[
    ...rxMeds.map(rx=>({
      time:rx.time, name:`${rx.drug} ${rx.dose}`, note:rx.instructions,
      dot:rx.dot, badge:rx.badge, badgeText:rx.badgeText,
      why:WHY_MAP[rx.drug.toLowerCase()]||WHY_MAP.default, isRx:true
    })),
    ...mealRows
  ].sort((a,b)=>a.time.localeCompare(b.time));

  if(allRows.length===0){c.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.84rem">Your schedule will appear here once your doctor prescribes medications.</div>';return;}

  allRows.forEach(d=>{
    const id='w'+Math.random().toString(36).slice(2);
    const row=document.createElement('div');row.className='tl-day-row';row.style.cursor='default';
    row.innerHTML=`<div class="tl-hr">${d.time}</div><div class="tl-dot-col"><div class="tl-dot ${d.dot}"></div></div><div class="tl-info"><span class="tl-name">${d.name}</span><div class="tl-badges"><span class="risk-badge ${d.badge}">${d.badgeText}</span><button class="why-btn" onclick="toggleWhy('${id}',this)">Why?</button></div><span class="tl-note">${d.note}</span></div>`;
    const why=document.createElement('div');why.className='why-panel';why.id=id;why.textContent=d.why;
    c.appendChild(row);c.appendChild(why);
  });
}
function toggleWhy(id,btn){
  const el=document.getElementById(id);const open=el.classList.contains('open');
  document.querySelectorAll('.why-panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.why-btn').forEach(b=>b.textContent='Why?');
  if(!open){el.classList.add('open');btn.textContent='Close';}
}
</script>
<script>
  // Setup the initial page from Django routes
  document.addEventListener("DOMContentLoaded", () => {
    const initialPage = "{{ initial_page|default:'landing' }}";
    const rawAuth = "{{ auth_user|escapejs }}";

    if (initialPage && initialPage !== 'landing') {
      showPage(initialPage);
      
      if (rawAuth) {
        try {
          // If we safely decoded a backend JWT during a dashboard route access
          const authUser = JSON.parse(rawAuth);
          launchDashboard(authUser);
        } catch(e) {}
      }
    }
  });
</script>
